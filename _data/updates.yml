- date: "July 1, 2026"
  body: >-
    Elected as secretary at the Middle Atlantic Division (MAD) at the
    Association of American Geographers (AAG)

- date: "June 9, 2026"
  body: >-
    Awarded a grant by the Center for International Development (CID) at
    Harvard University (my role: co-PI) on a project titled, "A Spatially
    Explicit and Reproducible Mobility-Aware Exposure Evaluation Platform
    (MEEP) for Climate-Vulnerable Cities"

- date: "June 7-10, 2026"
  body: >-
    Wrapped up another University Consortium for Geographic Information
    Science symposium! My master's student, Shirin A. Mahmoudian, presented
    her research on, "Generative AI for Urban Infrastructure Auditing: A
    Micro-scale Evaluation of Multimodal Transit Environments," and earned
    third place in the Student Paper Competition!
  images:
