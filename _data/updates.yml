- date: "May 13, 2026"
  body: >-
    Undergraduate students from GGS 366 won COS URC award for a paper
    titled, "How access and socioeconomic factors impact opioid overdosage:
    A case study of Washington DC".

- date: "May 4, 2026"
  body: >-
    Elected as a board member for the Transportation Geography Specialty
    Group (TGSG) at the Association of American Geographers (AAG)

- date: "March 17-21, 2026"
  body: |-
    At AAG 2026, I will be participating in a panel, and our research team will present several papers:
    <ul>
      <li><b>Panel:</b> AAG 2026 Symposium on Spatial AI and Data Science: Frontiers and Applications — Challenges and Opportunities of Mobility and Spatial Accessibility. Participants: Alexander Michels, Luyu Liu, Kyusik Kim, and Armita Kar</li>
      <li><b>Paper:</b> Interrelationship between pedestrian streetscape, walking perceptions, and willingness: An analysis using Structural Equation Modeling (SEM) and Explainable AI. Presenter: Yifei Wang</li>
      <li><b>Paper:</b> Exploring the Potential and Bias of Generative AI in Assessing Pedestrian Safety Perceptions. Presenter: Xi Guan</li>
      <li><b>Paper:</b> Healthcare Deserts in Virginia: Rural-Urban and Socioeconomic Disparities in Access to Care. Presenter: Armita Kar</li>
      <li><b>Paper:</b> Thermal Comfort Accessibility: Integrating the Impacts of Urban Heat into Space-Time Prisms under Climate Change. Presenter: Naser Ahmed</li>
    </ul>
